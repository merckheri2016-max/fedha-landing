<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0B0E11" />
  <meta name="description" content="Fedha - Personal Finance Management System" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fedha" />
  <title>Fedha - Personal Finance</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0B0E11; font-family: 'DM Sans', sans-serif; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #141820; }
    ::-webkit-scrollbar-thumb { background: #252D3D; border-radius: 3px; }
    input, select, textarea { font-family: 'DM Sans', sans-serif; }
    table { border-spacing: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, Fragment } = React;

    const COLORS = {
      bg: "#0B0E11", surface: "#141820", surfaceHover: "#1A2030",
      card: "#161C28", cardAlt: "#1C2333", border: "#252D3D", borderLight: "#2A3548",
      accent: "#00D4AA", accentDim: "rgba(0,212,170,0.12)", accentGlow: "rgba(0,212,170,0.25)",
      warn: "#FF6B6B", warnDim: "rgba(255,107,107,0.12)",
      orange: "#FFB347", orangeDim: "rgba(255,179,71,0.12)",
      blue: "#5B9FFF", blueDim: "rgba(91,159,255,0.12)",
      purple: "#B388FF", purpleDim: "rgba(179,136,255,0.12)",
      text: "#E8ECF4", textMuted: "#8892A8", textDim: "#5A6478",
    };

    const EXPENSE_CATEGORIES = ["Food","Transport","Rent","Bills","Savings","Investment","Business","Church","Entertainment","Emergencies","Health","Education","Other"];
    const INCOME_SOURCES = ["Salary","Business","Side Hustle","Gifts","Commissions","Freelance","Interest","Other"];
    const PAYMENT_METHODS = ["Cash","Bank Transfer","Mobile Money","Card","Cheque","Other"];
    const INVESTMENT_TYPES = ["Shares","Mutual Funds","Bonds","Fixed Deposits","Business Investment","Land/Property","Other"];

    const STORAGE_KEY = "pf_data_v2";
    const fmt = (n) => (Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0});
    const fmtDate = (d) => new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    const today = () => new Date().toISOString().split("T")[0];
    const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
    const currentMonth = () => new Date().toISOString().slice(0,7);

    const defaultUser = () => ({name:"",email:"",currency:"TZS",pin:""});
    const defaultData = () => ({user:defaultUser(),registered:false,incomes:[],expenses:[],budgets:{},savingsGoals:[],investments:[],notifications:[]});

    const loadData = () => { try { const s=localStorage.getItem(STORAGE_KEY); if(s) return JSON.parse(s); } catch(e){} return null; };
    const saveData = (data) => { try { localStorage.setItem(STORAGE_KEY,JSON.stringify(data)); } catch(e){} };

    const Icon = ({name,size=20,color=COLORS.textMuted}) => {
      const icons = {
        dashboard: <Fragment><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></Fragment>,
        income: <Fragment><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></Fragment>,
        expense: <Fragment><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></Fragment>,
        budget: <Fragment><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="12" y1="10" x2="12" y2="20"/></Fragment>,
        savings: <Fragment><path d="M19 5c-1.5 0-2.8 1.4-3 2-3.5-1.5-11-.3-11 5 0 4 3 7 7 8V22h4v-2h1c2 0 3-1 3-3s-1-3-3-3H16v-2c2 0 3-1 3-3V5z"/></Fragment>,
        invest: <Fragment><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></Fragment>,
        reports: <Fragment><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></Fragment>,
        profile: <Fragment><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Fragment>,
        plus: <Fragment><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Fragment>,
        close: <Fragment><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Fragment>,
        check: <Fragment><polyline points="20 6 9 17 4 12"/></Fragment>,
        trash: <Fragment><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Fragment>,
        bell: <Fragment><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></Fragment>,
        edit: <Fragment><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Fragment>,
        logout: <Fragment><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Fragment>,
        target: <Fragment><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Fragment>,
        calendar: <Fragment><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Fragment>,
        filter: <Fragment><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></Fragment>,
        download: <Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Fragment>,
        alert: <Fragment><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Fragment>,
      };
      return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons[name]||null}</svg>);
    };

    const btnBase = {border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,borderRadius:10,transition:"all 0.2s"};

    const Btn = ({children,onClick,variant="primary",style={},disabled}) => {
      const vars = {
        primary:{background:COLORS.accent,color:"#0B0E11",padding:"10px 22px",fontSize:14},
        secondary:{background:COLORS.surfaceHover,color:COLORS.text,padding:"10px 22px",fontSize:14,border:"1px solid "+COLORS.border},
        danger:{background:COLORS.warnDim,color:COLORS.warn,padding:"8px 16px",fontSize:13},
        ghost:{background:"transparent",color:COLORS.textMuted,padding:"8px 14px",fontSize:13},
        small:{background:COLORS.accentDim,color:COLORS.accent,padding:"6px 14px",fontSize:12},
      };
      return (<button onClick={onClick} disabled={disabled} style={{...btnBase,...vars[variant],opacity:disabled?0.5:1,...style}}>{children}</button>);
    };

    const Input = ({label,value,onChange,type="text",placeholder,options,style={}}) => {
      const base = {background:COLORS.surface,border:"1px solid "+COLORS.border,borderRadius:10,color:COLORS.text,padding:"10px 14px",fontSize:14,width:"100%",fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"};
      return (
        <div style={{marginBottom:14,...style}}>
          {label && <label style={{display:"block",fontSize:12,color:COLORS.textMuted,marginBottom:6,fontWeight:500}}>{label}</label>}
          {options ? (
            <select value={value} onChange={(e)=>onChange(e.target.value)} style={{...base,appearance:"auto"}}>
              <option value="">{placeholder||"Select..."}</option>
              {options.map((o)=><option key={o} value={o}>{o}</option>)}
            </select>
          ) : type==="textarea" ? (
            <textarea value={value} onChange={(e)=>onChange(e.target.value)} placeholder={placeholder} rows={3} style={{...base,resize:"vertical"}} />
          ) : (
            <input type={type} value={value} onChange={(e)=>onChange(e.target.value)} placeholder={placeholder} style={base} />
          )}
        </div>
      );
    };

    const Card = ({children,style={},onClick}) => (
      <div onClick={onClick} style={{background:COLORS.card,border:"1px solid "+COLORS.border,borderRadius:14,padding:20,...style,cursor:onClick?"pointer":"default"}}>{children}</div>
    );

    const Modal = ({open,onClose,title,children,width=480}) => {
      if(!open) return null;
      return (
        <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.7)",backdropFilter:"blur(4px)"}} onClick={onClose}>
          <div onClick={(e)=>e.stopPropagation()} style={{background:COLORS.surface,border:"1px solid "+COLORS.border,borderRadius:18,padding:28,width:"90%",maxWidth:width,maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h3 style={{margin:0,fontSize:18,color:COLORS.text}}>{title}</h3>
              <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Icon name="close" color={COLORS.textMuted}/></button>
            </div>
            {children}
          </div>
        </div>
      );
    };

    const StatCard = ({label,value,sub,color=COLORS.accent,icon}) => (
      <Card style={{flex:"1 1 200px",minWidth:170}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:12,color:COLORS.textMuted,marginBottom:6,fontWeight:500}}>{label}</div>
            <div style={{fontSize:24,fontWeight:700,color,fontFamily:"'Space Mono',monospace"}}>{value}</div>
            {sub && <div style={{fontSize:12,color:COLORS.textMuted,marginTop:4}}>{sub}</div>}
          </div>
          {icon && <div style={{background:color+"18",borderRadius:10,padding:10,display:"flex"}}><Icon name={icon} color={color} size={20}/></div>}
        </div>
      </Card>
    );

    const ProgressBar = ({value,max,color=COLORS.accent,height=8}) => {
      const pct = max>0?Math.min((value/max)*100,100):0;
      return (<div style={{background:COLORS.bg,borderRadius:height,height,width:"100%",overflow:"hidden"}}><div style={{width:pct+"%",height:"100%",background:color,borderRadius:height,transition:"width 0.6s ease"}}/></div>);
    };

    const EmptyState = ({icon,message,action,onAction}) => (
      <div style={{textAlign:"center",padding:"50px 20px",color:COLORS.textDim}}>
        <div style={{marginBottom:16,opacity:0.5}}><Icon name={icon} size={48} color={COLORS.textDim}/></div>
        <div style={{fontSize:15,marginBottom:16}}>{message}</div>
        {action && <Btn onClick={onAction} variant="small">{action}</Btn>}
      </div>
    );

    const MiniBar = ({data,color,height=60}) => {
      if(!data.length) return null;
      const max = Math.max(...data,1);
      const w = 100/data.length;
      return (<svg width="100%" height={height} viewBox={"0 0 100 "+height} preserveAspectRatio="none">
        {data.map((v,i)=>{const h=(v/max)*(height-4); return <rect key={i} x={i*w+w*0.15} y={height-h} width={w*0.7} height={h} rx={2} fill={color} opacity={0.7+(i/data.length)*0.3}/>;})}
      </svg>);
    };

    // Auth Page
    const AuthPage = ({data,setData,onDone}) => {
      const [mode,setMode] = useState(data.registered?"login":"register");
      const [form,setForm] = useState({name:"",email:"",pin:"",currency:"TZS"});
      const [error,setError] = useState("");
      const handleRegister = () => {
        if(!form.name||!form.email||!form.pin) return setError("All fields are required");
        if(form.pin.length<4) return setError("PIN must be at least 4 characters");
        const nd={...data,user:{name:form.name,email:form.email,pin:form.pin,currency:form.currency},registered:true};
        setData(nd);saveData(nd);onDone();
      };
      const handleLogin = () => {
        if(form.email===data.user.email&&form.pin===data.user.pin){onDone();}
        else setError("Invalid credentials");
      };
      return (
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:COLORS.bg,padding:20}}>
          <div style={{width:"100%",maxWidth:420}}>
            <div style={{textAlign:"center",marginBottom:36}}>
              <div style={{fontSize:36,fontWeight:800,color:COLORS.accent,fontFamily:"'Space Mono',monospace",letterSpacing:-1}}>Fedha</div>
              <div style={{fontSize:14,color:COLORS.textMuted,marginTop:6}}>Personal Finance System</div>
            </div>
            <Card style={{padding:32}}>
              <div style={{display:"flex",gap:8,marginBottom:24}}>
                {["login","register"].map((m)=>(
                  <button key={m} onClick={()=>{setMode(m);setError("");}} style={{...btnBase,flex:1,padding:"10px 0",fontSize:14,background:mode===m?COLORS.accentDim:"transparent",color:mode===m?COLORS.accent:COLORS.textMuted,border:"1px solid "+(mode===m?COLORS.accent+"40":COLORS.border)}}>{m==="login"?"Sign In":"Register"}</button>
                ))}
              </div>
              {mode==="register"&&<Input label="Full Name" value={form.name} onChange={(v)=>setForm({...form,name:v})} placeholder="Your name"/>}
              <Input label="Email" value={form.email} onChange={(v)=>setForm({...form,email:v})} type="email" placeholder="you@example.com"/>
              <Input label="PIN / Password" value={form.pin} onChange={(v)=>setForm({...form,pin:v})} type="password" placeholder="Min 4 characters"/>
              {mode==="register"&&<Input label="Currency" value={form.currency} onChange={(v)=>setForm({...form,currency:v})} options={["TZS","KES","UGX","USD","EUR","GBP"]}/>}
              {error&&<div style={{color:COLORS.warn,fontSize:13,marginBottom:12}}>{error}</div>}
              <Btn onClick={mode==="register"?handleRegister:handleLogin} style={{width:"100%",marginTop:8}}>{mode==="register"?"Create Account":"Sign In"}</Btn>
              {mode==="login"&&data.registered&&(
                <div style={{textAlign:"center",marginTop:16}}>
                  <button onClick={()=>{setData(defaultData());saveData(defaultData());setMode("register");}} style={{background:"none",border:"none",color:COLORS.textDim,fontSize:12,cursor:"pointer",textDecoration:"underline"}}>Reset all data & start fresh</button>
                </div>
              )}
            </Card>
          </div>
        </div>
      );
    };

    // Dashboard
    const DashboardPage = ({data}) => {
      const cm=currentMonth();
      const monthIncomes=data.incomes.filter((i)=>i.date.startsWith(cm));
      const monthExpenses=data.expenses.filter((e)=>e.date.startsWith(cm));
      const totalIncome=monthIncomes.reduce((s,i)=>s+Number(i.amount),0);
      const totalExpense=monthExpenses.reduce((s,e)=>s+Number(e.amount),0);
      const balance=totalIncome-totalExpense;
      const budget=data.budgets[cm]||{};
      const totalBudget=Object.values(budget).reduce((s,v)=>s+Number(v),0);
      const totalSavings=data.savingsGoals.reduce((s,g)=>s+Number(g.saved||0),0);
      const totalSavingsTarget=data.savingsGoals.reduce((s,g)=>s+Number(g.target),0);
      const totalInvested=data.investments.reduce((s,inv)=>s+Number(inv.amount),0);
      const recentTx=[...data.incomes.map((i)=>({...i,txType:"income"})),...data.expenses.map((e)=>({...e,txType:"expense"}))].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);
      const catSpend={};
      monthExpenses.forEach((e)=>{catSpend[e.category]=(catSpend[e.category]||0)+Number(e.amount);});
      const topCats=Object.entries(catSpend).sort((a,b)=>b[1]-a[1]).slice(0,5);
      const last7=[];
      for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split("T")[0];last7.push(data.expenses.filter((e)=>e.date===ds).reduce((s,e)=>s+Number(e.amount),0));}
      const cur=data.user.currency||"TZS";
      const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const last7Labels=[];
      for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);last7Labels.push(dayNames[d.getDay()]);}

      return (
        <div>
          <div style={{marginBottom:28}}>
            <h2 style={{margin:0,fontSize:22,color:COLORS.text,fontWeight:700}}>Welcome back, {data.user.name.split(" ")[0]}</h2>
            <div style={{fontSize:13,color:COLORS.textMuted,marginTop:4}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</div>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:14,marginBottom:24}}>
            <StatCard label="Monthly Income" value={cur+" "+fmt(totalIncome)} icon="income" color={COLORS.accent}/>
            <StatCard label="Monthly Expenses" value={cur+" "+fmt(totalExpense)} icon="expense" color={COLORS.warn}/>
            <StatCard label="Balance" value={cur+" "+fmt(balance)} icon="dashboard" color={balance>=0?COLORS.blue:COLORS.warn}/>
            <StatCard label="Budget Set" value={cur+" "+fmt(totalBudget)} sub={totalBudget>0?Math.round((totalExpense/totalBudget)*100)+"% used":"Not set"} icon="budget" color={COLORS.orange}/>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:14,marginBottom:24}}>
            <StatCard label="Savings Progress" value={cur+" "+fmt(totalSavings)} sub={totalSavingsTarget>0?"of "+cur+" "+fmt(totalSavingsTarget)+" target":"No goals set"} icon="savings" color={COLORS.purple}/>
            <StatCard label="Total Invested" value={cur+" "+fmt(totalInvested)} sub={data.investments.length+" investment(s)"} icon="invest" color={COLORS.blue}/>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:14}}>
            <Card style={{flex:"1 1 300px"}}>
              <div style={{fontSize:13,color:COLORS.textMuted,fontWeight:600,marginBottom:14}}>Last 7 Days Spending</div>
              <MiniBar data={last7} color={COLORS.warn} height={70}/>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
                {last7Labels.map((d,i)=>(<span key={i} style={{fontSize:10,color:COLORS.textDim}}>{d}</span>))}
              </div>
            </Card>
            <Card style={{flex:"1 1 300px"}}>
              <div style={{fontSize:13,color:COLORS.textMuted,fontWeight:600,marginBottom:14}}>Top Spending Categories</div>
              {topCats.length===0?<div style={{color:COLORS.textDim,fontSize:13}}>No expenses this month</div>:topCats.map(([cat,amt])=>(
                <div key={cat} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                    <span style={{color:COLORS.text}}>{cat}</span>
                    <span style={{color:COLORS.textMuted,fontFamily:"'Space Mono',monospace",fontSize:12}}>{cur} {fmt(amt)}</span>
                  </div>
                  <ProgressBar value={amt} max={totalExpense} color={COLORS.orange}/>
                </div>
              ))}
            </Card>
            <Card style={{flex:"1 1 100%",maxWidth:"100%"}}>
              <div style={{fontSize:13,color:COLORS.textMuted,fontWeight:600,marginBottom:14}}>Recent Transactions</div>
              {recentTx.length===0?<div style={{color:COLORS.textDim,fontSize:13}}>No transactions yet</div>:(
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead><tr style={{color:COLORS.textDim,textAlign:"left"}}>
                      <th style={{padding:"6px 10px",fontWeight:500}}>Date</th>
                      <th style={{padding:"6px 10px",fontWeight:500}}>Type</th>
                      <th style={{padding:"6px 10px",fontWeight:500}}>Details</th>
                      <th style={{padding:"6px 10px",fontWeight:500,textAlign:"right"}}>Amount</th>
                    </tr></thead>
                    <tbody>
                      {recentTx.map((tx)=>(
                        <tr key={tx.id} style={{borderTop:"1px solid "+COLORS.border}}>
                          <td style={{padding:"8px 10px",color:COLORS.textMuted}}>{fmtDate(tx.date)}</td>
                          <td style={{padding:"8px 10px"}}><span style={{padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:tx.txType==="income"?COLORS.accentDim:COLORS.warnDim,color:tx.txType==="income"?COLORS.accent:COLORS.warn}}>{tx.txType==="income"?"Income":"Expense"}</span></td>
                          <td style={{padding:"8px 10px",color:COLORS.text}}>{tx.source||tx.category}{tx.description?" — "+tx.description:""}</td>
                          <td style={{padding:"8px 10px",textAlign:"right",fontFamily:"'Space Mono',monospace",color:tx.txType==="income"?COLORS.accent:COLORS.warn}}>{tx.txType==="income"?"+":"−"}{cur} {fmt(tx.amount)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </Card>
          </div>
        </div>
      );
    };

    // Income Page
    const IncomePage = ({data,setData}) => {
      const [modal,setModal]=useState(false);
      const [form,setForm]=useState({date:today(),source:"",amount:"",method:"",notes:""});
      const cur=data.user.currency;
      const add=()=>{
        if(!form.source||!form.amount) return;
        const nd={...data,incomes:[...data.incomes,{...form,id:uid(),amount:Number(form.amount)}]};
        setData(nd);saveData(nd);setModal(false);setForm({date:today(),source:"",amount:"",method:"",notes:""});
      };

      );
    };

    // Expense Page
    const ExpensePage = ({data,setData}) => {
      const [modal,setModal]=useState(false);
      const [form,setForm]=useState({date:today(),category:"",description:"",amount:"",method:"",notes:""});
      const cur=data.user.currency;
      const add=()=>{
        if(!form.category||!form.amount) return;
        const nd={...data,expenses:[...data.expenses,{...form,id:uid(),amount:Number(form.amount)}]};
        setData(nd);saveData(nd);setModal(false);setForm({date:today(),category:"",description:"",amount:"",method:"",notes:""});
        const cm=currentMonth();const budget=nd.budgets[cm]||{};const catBudget=Number(budget[form.category])||0;
        if(catBudget>0){
          const catSpent=nd.expenses.filter((e)=>e.date.startsWith(cm)&&e.category===form.category).reduce((s,e)=>s+Number(e.amount),0);
          if(catSpent>=catBudget){

      };

      const sorted=[...data.expenses].sort((a,b)=>b.date.localeCompare(a.date));

            <Btn onClick={()=>setModal(true)}><span style={{display:"flex",alignItems:"center",gap:6}}><Icon name="plus" size={16} color="#0B0E11"/> Add Expense</span></Btn>
          </div>
          {sorted.length===0?<EmptyState icon="expense" message="No expenses recorded yet" action="Add Expense" onAction={()=>setModal(true)}/>:(
            <Card style={{padding:0,overflow:"hidden"}}><div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{color:COLORS.textDim,textAlign:"left",background:COLORS.cardAlt}}>
                  {["Date","Category","Description","Method","Amount",""].map((h)=>(<th key={h} style={{padding:"10px 14px",fontWeight:500,textAlign:h==="Amount"?"right":"left"}}>{h}</th>))}
                </tr></thead>
                <tbody>{sorted.map((e)=>(
                  <tr key={e.id} style={{borderTop:"1px solid "+COLORS.border}}>

                    <td style={{padding:"10px 14px",color:COLORS.textMuted}}>{e.description}</td>
                    <td style={{padding:"10px 14px",color:COLORS.textMuted}}>{e.method}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",fontFamily:"'Space Mono',monospace",color:COLORS.warn,fontWeight:600}}>-{cur} {fmt(e.amount)}</td>
                    <td style={{padding:"10px 14px"}}><button onClick={()=>del(e.id)} style={{background:"none",border:"none",cursor:"pointer",opacity:0.5}}><Icon name="trash" size={16} color={COLORS.warn}/></button></td>
                  </tr>

              </table>
            </div></Card>

            <Input label="Payment Method" value={form.method} onChange={(v)=>setForm({...form,method:v})} options={PAYMENT_METHODS}/>

            <Btn onClick={add} style={{width:"100%"}}>Save Expense</Btn>
          </Modal>
        </div>

    // Budget Page
    const BudgetPage = ({data,setData}) => {
      const cm=currentMonth();
      const [month,setMonth]=useState(cm);
      const budget=data.budgets[month]||{};
      const cur=data.user.currency;
      const [editing,setEditing]=useState(null);
      const [val,setVal]=useState("");
      const setBudget=(cat,amount)=>{
        const nb={...data.budgets,[month]:{...(data.budgets[month]||{}),[cat]:Number(amount)||0}};
        if(!amount||Number(amount)===0) delete nb[month][cat];
        const nd={...data,budgets:nb};setData(nd);saveData(nd);setEditing(null);
      };
      const monthExpenses=data.expenses.filter((e)=>e.date.startsWith(month));
      const catSpend={};monthExpenses.forEach((e)=>{catSpend[e.category]=(catSpend[e.category]||0)+Number(e.amount);});
      const totalBudget=Object.values(budget).reduce((s,v)=>s+Number(v),0);
      const totalSpent=monthExpenses.reduce((s,e)=>s+Number(e.amount),0);
      return (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:12}}>

              <div style={{fontSize:13,color:COLORS.textMuted,marginTop:4}}>Budget: <span style={{color:COLORS.orange,fontFamily:"'Space Mono',monospace"}}>{cur} {fmt(totalBudget)}</span> | Spent: <span style={{color:COLORS.warn,fontFamily:"'Space Mono',monospace"}}>{cur} {fmt(totalSpent)}</span></div>

                <span style={{color:totalSpent>totalBudget?COLORS.warn:COLORS.accent,fontFamily:"'Space Mono',monospace"}}>{Math.round((totalSpent/totalBudget)*100)}%</span>
              </div>
              <ProgressBar value={totalSpent} max={totalBudget} color={totalSpent>totalBudget?COLORS.warn:COLORS.accent} height={10}/>
            </Card>
          )}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
            {EXPENSE_CATEGORIES.map((cat)=>{
              const planned=Number(budget[cat])||0;const spent=catSpend[cat]||0;const pct=planned>0?Math.round((spent/planned)*100):0;const over=spent>planned&&planned>0;
              return (
                <Card key={cat}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <span style={{fontSize:14,fontWeight:600,color:COLORS.text}}>{cat}</span>
                    {editing===cat?(
                      <div style={{display:"flex",gap:6}}>
                        <input type="number" value={val} onChange={(e)=>setVal(e.target.value)} placeholder="Amount" style={{width:90,padding:"4px 8px",borderRadius:6,border:"1px solid "+COLORS.border,background:COLORS.bg,color:COLORS.text,fontSize:13,fontFamily:"'Space Mono',monospace"}} autoFocus onKeyDown={(e)=>e.key==="Enter"&&setBudget(cat,val)}/>
                        <button onClick={()=>setBudget(cat,val)} style={{background:COLORS.accentDim,border:"none",borderRadius:6,padding:"4px 8px",cursor:"pointer"}}><Icon name="check" size={14} color={COLORS.accent}/></button>
                      </div>
                    ):(
                      <button onClick={()=>{setEditing(cat);setVal(planned||"");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:COLORS.accent}}>{planned>0?"Edit":"+ Set"}</button>
                    )}
                  </div>
                  {planned>0&&(<Fragment>
                    <ProgressBar value={spent} max={planned} color={over?COLORS.warn:COLORS.accent}/>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:12}}>
                      <span style={{color:over?COLORS.warn:COLORS.textMuted}}>Spent: {cur} {fmt(spent)}</span>
                      <span style={{color:COLORS.textDim}}>of {cur} {fmt(planned)}</span>
                    </div>
                    {over&&<div style={{fontSize:11,color:COLORS.warn,marginTop:4,display:"flex",alignItems:"center",gap:4}}><Icon name="alert" size={12} color={COLORS.warn}/> Over budget by {cur} {fmt(spent-planned)}</div>}
                  </Fragment>)}
                  {planned===0&&<div style={{fontSize:12,color:COLORS.textDim}}>No budget set</div>}
                </Card>
              );
            })}
          </div>
        </div>
      );
    };

    // Savings Page
    const SavingsPage = ({data,setData}) => {
      const [modal,setModal]=useState(false);
      const [addModal,setAddModal]=useState(null);
      const [form,setForm]=useState({name:"",target:"",saved:"0",deadline:""});
      const [addAmt,setAddAmt]=useState("");
      const cur=data.user.currency;
      const add=()=>{
        if(!form.name||!form.target) return;
        const nd={...data,savingsGoals:[...data.savingsGoals,{...form,id:uid(),target:Number(form.target),saved:Number(form.saved)||0}]};
        setData(nd);saveData(nd);setModal(false);setForm({name:"",target:"",saved:"0",deadline:""});
      };
      const addSavings=(goalId)=>{
        if(!addAmt) return;
        const nd={...data,savingsGoals:data.savingsGoals.map((g)=>g.id===goalId?{...g,saved:Number(g.saved)+Number(addAmt)}:g)};
        setData(nd);saveData(nd);setAddModal(null);setAddAmt("");
      };
      const del=(id)=>{const nd={...data,savingsGoals:data.savingsGoals.filter((g)=>g.id!==id)};setData(nd);saveData(nd);};
      const totalSaved=data.savingsGoals.reduce((s,g)=>s+Number(g.saved),0);
      const totalTarget=data.savingsGoals.reduce((s,g)=>s+Number(g.target),0);

        <div>

              <div style={{fontSize:13,color:COLORS.textMuted,marginTop:4}}>Saved: <span style={{color:COLORS.purple,fontFamily:"'Space Mono',monospace"}}>{cur} {fmt(totalSaved)}</span> of {cur} {fmt(totalTarget)}</div>
            </div>
            <Btn onClick={()=>setModal(true)}><span style={{display:"flex",alignItems:"center",gap:6}}><Icon name="plus" size={16} color="#0B0E11"/> New Goal</span></Btn>
          </div>
          {data.savingsGoals.length===0?<EmptyState icon="target" message="No savings goals yet" action="Create Goal" onAction={()=>setModal(true)}/>:(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
              {data.savingsGoals.map((g)=>{
                const pct=Number(g.target)>0?Math.round((Number(g.saved)/Number(g.target))*100):0;
                const remaining=Math.max(0,Number(g.target)-Number(g.saved));
                return (

                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div><div style={{fontSize:16,fontWeight:700,color:COLORS.text}}>{g.name}</div>{g.deadline&&<div style={{fontSize:12,color:COLORS.textDim,marginTop:2}}>Due: {fmtDate(g.deadline)}</div>}</div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>{setAddModal(g.id);setAddAmt("");}} style={{background:COLORS.accentDim,border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer"}}><Icon name="plus" size={14} color={COLORS.accent}/></button>
                        <button onClick={()=>del(g.id)} style={{background:COLORS.warnDim,border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer"}}><Icon name="trash" size={14} color={COLORS.warn}/></button>
                      </div>
                    </div>
                    <div style={{margin:"16px 0 8px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
                        <span style={{color:COLORS.purple,fontFamily:"'Space Mono',monospace",fontWeight:600}}>{pct}%</span>
                        <span style={{color:COLORS.textMuted}}>{cur} {fmt(g.saved)} / {cur} {fmt(g.target)}</span>
                      </div>
                      <ProgressBar value={Number(g.saved)} max={Number(g.target)} color={COLORS.purple} height={10}/>
                    </div>
                    <div style={{fontSize:12,color:COLORS.textDim}}>Remaining: {cur} {fmt(remaining)}</div>
                    {pct>=100&&<div style={{fontSize:12,color:COLORS.accent,marginTop:4,fontWeight:600}}>Goal reached!</div>}
                  </Card>
                );
              })}
            </div>
          )}
          <Modal open={modal} onClose={()=>setModal(false)} title="New Savings Goal">
            <Input label="Goal Name" value={form.name} onChange={(v)=>setForm({...form,name:v})} placeholder="e.g. Emergency Fund"/>
            <Input label="Target Amount" type="number" value={form.target} onChange={(v)=>setForm({...form,target:v})} placeholder="0"/>
            <Input label="Already Saved" type="number" value={form.saved} onChange={(v)=>setForm({...form,saved:v})} placeholder="0"/>
            <Input label="Target Date (optional)" type="date" value={form.deadline} onChange={(v)=>setForm({...form,deadline:v})}/>
            <Btn onClick={add} style={{width:"100%"}}>Create Goal</Btn>
          </Modal>
          <Modal open={!!addModal} onClose={()=>setAddModal(null)} title="Add to Savings" width={360}>
            <Input label="Amount to Add" type="number" value={addAmt} onChange={setAddAmt} placeholder="0"/>
            <Btn onClick={()=>addSavings(addModal)} style={{width:"100%"}}>Add Savings</Btn>
          </Modal>
        </div>
      );
    };

    // Investment Page
    const InvestmentPage = ({data,setData}) => {
      const [modal,setModal]=useState(false);
      const [form,setForm]=useState({type:"",name:"",amount:"",date:today(),expectedReturn:"",currentValue:"",notes:""});
      const cur=data.user.currency;
      const add=()=>{
        if(!form.type||!form.amount) return;
        const nd={...data,investments:[...data.investments,{...form,id:uid(),amount:Number(form.amount),expectedReturn:Number(form.expectedReturn)||0,currentValue:Number(form.currentValue)||Number(form.amount)}]};
        setData(nd);saveData(nd);setModal(false);setForm({type:"",name:"",amount:"",date:today(),expectedReturn:"",currentValue:"",notes:""});
      };
      const del=(id)=>{const nd={...data,investments:data.investments.filter((i)=>i.id!==id)};setData(nd);saveData(nd);};
      const totalInvested=data.investments.reduce((s,i)=>s+Number(i.amount),0);
      const totalCurrent=data.investments.reduce((s,i)=>s+Number(i.currentValue||i.amount),0);
      const gain=totalCurrent-totalInvested;
      return (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:12}}>
            <div><h2 style={{margin:0,fontSize:22,color:COLORS.text}}>Investments</h2>
              <div style={{fontSize:13,color:COLORS.textMuted,marginTop:4}}>Invested: <span style={{color:COLORS.blue,fontFamily:"'Space Mono',monospace"}}>{cur} {fmt(totalInvested)}</span>
              {gain!==0&&<span> | <span style={{color:gain>0?COLORS.accent:COLORS.warn}}>{gain>0?"+":""}{cur} {fmt(gain)}</span></span>}</div>
            </div>
            <Btn onClick={()=>setModal(true)}><span style={{display:"flex",alignItems:"center",gap:6}}><Icon name="plus" size={16} color="#0B0E11"/> Add Investment</span></Btn>
          </div>
          {data.investments.length===0?<EmptyState icon="invest" message="No investments recorded yet" action="Add Investment" onAction={()=>setModal(true)}/>:(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
              {data.investments.map((inv)=>{
                const g=Number(inv.currentValue||inv.amount)-Number(inv.amount);
                return (
                  <Card key={inv.id}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>

            <Btn onClick={add} style={{width:"100%"}}>Save Investment</Btn>
          </Modal>
        </div>

    // Reports Page
    const ReportsPage = ({data}) => {
      const cur=data.user.currency;const cm=currentMonth();
      const months=[];
      for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const m=d.toISOString().slice(0,7);

        const exp=data.expenses.filter((x)=>x.date.startsWith(m)).reduce((s,x)=>s+Number(x.amount),0);
        months.push({month:m,label:d.toLocaleDateString("en-US",{month:"short"}),income:inc,expense:exp});
      }
      const maxVal=Math.max(...months.map((m)=>Math.max(m.income,m.expense)),1);
      const catSpend={};data.expenses.filter((e)=>e.date.startsWith(cm)).forEach((e)=>{catSpend[e.category]=(catSpend[e.category]||0)+Number(e.amount);});
      const catEntries=Object.entries(catSpend).sort((a,b)=>b[1]-a[1]);
      const totalExp=catEntries.reduce((s,[,v])=>s+v,0);
      const srcIncome={};data.incomes.filter((i)=>i.date.startsWith(cm)).forEach((i)=>{srcIncome[i.source]=(srcIncome[i.source]||0)+Number(i.amount);});
      const srcEntries=Object.entries(srcIncome).sort((a,b)=>b[1]-a[1]);
      const catColors=[COLORS.accent,COLORS.blue,COLORS.orange,COLORS.purple,COLORS.warn,"#FF87B2","#67E8F9","#A3E635","#FB923C","#C084FC"];
      return (
        <div>
          <h2 style={{margin:"0 0 24px",fontSize:22,color:COLORS.text}}>Reports & Analysis</h2>
          <Card style={{marginBottom:20}}>
            <div style={{fontSize:13,color:COLORS.textMuted,fontWeight:600,marginBottom:16}}>Income vs Expenses (Last 6 Months)</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:6,height:140}}>
              {months.map((m)=>(
                <div key={m.month} style={{flex:1,textAlign:"center"}}>
                  <div style={{display:"flex",gap:2,justifyContent:"center",alignItems:"flex-end",height:110}}>
                    <div style={{width:"40%",background:COLORS.accent,borderRadius:"4px 4px 0 0",height:(m.income/maxVal)*110+"px",minHeight:2,opacity:0.8}}/>
                    <div style={{width:"40%",background:COLORS.warn,borderRadius:"4px 4px 0 0",height:(m.expense/maxVal)*110+"px",minHeight:2,opacity:0.8}}/>
                  </div>
                  <div style={{fontSize:11,color:COLORS.textDim,marginTop:6}}>{m.label}</div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:14}}>
              <span style={{fontSize:12,color:COLORS.accent,display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:COLORS.accent,borderRadius:2,display:"inline-block"}}/> Income</span>
              <span style={{fontSize:12,color:COLORS.warn,display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:COLORS.warn,borderRadius:2,display:"inline-block"}}/> Expenses</span>
            </div>
          </Card>
          <div style={{display:"flex",flexWrap:"wrap",gap:14}}>
            <Card style={{flex:"1 1 300px"}}>
              <div style={{fontSize:13,color:COLORS.textMuted,fontWeight:600,marginBottom:16}}>Expense Breakdown (This Month)</div>
              {catEntries.length===0?<div style={{color:COLORS.textDim,fontSize:13}}>No data</div>:(
                <Fragment>
                  <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:16}}>
                    {catEntries.map(([cat,amt],i)=>(<div key={cat} style={{height:8,borderRadius:4,width:Math.max((amt/totalExp)*100,3)+"%",background:catColors[i%catColors.length]}}/>))}
                  </div>
                  {catEntries.map(([cat,amt],i)=>(
                    <div key={cat} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid "+COLORS.border}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{width:10,height:10,borderRadius:3,background:catColors[i%catColors.length],display:"inline-block"}}/><span style={{fontSize:13,color:COLORS.text}}>{cat}</span></div>
                      <div style={{textAlign:"right"}}><span style={{fontSize:13,color:COLORS.text,fontFamily:"'Space Mono',monospace"}}>{cur} {fmt(amt)}</span><span style={{fontSize:11,color:COLORS.textDim,marginLeft:8}}>{Math.round((amt/totalExp)*100)}%</span></div>
                    </div>
                  ))}
                </Fragment>
              )}
            </Card>
            <Card style={{flex:"1 1 300px"}}>
              <div style={{fontSize:13,color:COLORS.textMuted,fontWeight:600,marginBottom:16}}>Income by Source (This Month)</div>
              {srcEntries.length===0?<div style={{color:COLORS.textDim,fontSize:13}}>No data</div>:srcEntries.map(([src,amt],i)=>(
                <div key={src} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                    <span style={{color:COLORS.text}}>{src}</span><span style={{color:COLORS.accent,fontFamily:"'Space Mono',monospace"}}>{cur} {fmt(amt)}</span>
                  </div>
                  <ProgressBar value={amt} max={srcEntries[0][1]} color={catColors[i%catColors.length]}/>
                </div>
              ))}
            </Card>
          </div>
        </div>
      );
    };

    // Profile Page
    const ProfilePage = ({data,setData,onLogout}) => {
      const [form,setForm]=useState({name:data.user.name,email:data.user.email,currency:data.user.currency,pin:""});
      const [saved,setSaved]=useState(false);
      const save=()=>{
        const nd={...data,user:{...data.user,name:form.name,email:form.email,currency:form.currency,...(form.pin?{pin:form.pin}:{})}};
        setData(nd);saveData(nd);setSaved(true);setTimeout(()=>setSaved(false),2000);
      };
      const exportData=()=>{
        const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
        const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="fedha-backup.json";a.click();URL.revokeObjectURL(url);
      };
      return (
        <div>
          <h2 style={{margin:"0 0 24px",fontSize:22,color:COLORS.text}}>Profile & Settings</h2>
          <div style={{maxWidth:500}}>
            <Card style={{marginBottom:20}}>
              <div style={{fontSize:14,fontWeight:600,color:COLORS.text,marginBottom:16}}>Personal Information</div>
              <Input label="Full Name" value={form.name} onChange={(v)=>setForm({...form,name:v})}/>
              <Input label="Email" value={form.email} onChange={(v)=>setForm({...form,email:v})} type="email"/>
              <Input label="Currency" value={form.currency} onChange={(v)=>setForm({...form,currency:v})} options={["TZS","KES","UGX","USD","EUR","GBP"]}/>
              <Input label="New PIN (leave blank to keep current)" value={form.pin} onChange={(v)=>setForm({...form,pin:v})} type="password"/>
              <div style={{display:"flex",gap:10}}><Btn onClick={save}>Save Changes</Btn>{saved&&<span style={{color:COLORS.accent,fontSize:13,alignSelf:"center"}}>Saved!</span>}</div>
            </Card>
            <Card style={{marginBottom:20}}>
              <div style={{fontSize:14,fontWeight:600,color:COLORS.text,marginBottom:12}}>Data Management</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <Btn onClick={exportData} variant="secondary"><span style={{display:"flex",alignItems:"center",gap:6}}><Icon name="download" size={16} color={COLORS.textMuted}/> Export Data</span></Btn>
                <Btn onClick={onLogout} variant="danger"><span style={{display:"flex",alignItems:"center",gap:6}}><Icon name="logout" size={16} color={COLORS.warn}/> Log Out</span></Btn>
              </div>
            </Card>
            <Card>
              <div style={{fontSize:14,fontWeight:600,color:COLORS.text,marginBottom:8}}>Account Stats</div>
              <div style={{fontSize:13,color:COLORS.textMuted,lineHeight:2}}>
                <div>Total income entries: <span style={{color:COLORS.text}}>{data.incomes.length}</span></div>
                <div>Total expense entries: <span style={{color:COLORS.text}}>{data.expenses.length}</span></div>
                <div>Savings goals: <span style={{color:COLORS.text}}>{data.savingsGoals.length}</span></div>
                <div>Investments: <span style={{color:COLORS.text}}>{data.investments.length}</span></div>
              </div>
            </Card>
          </div>
        </div>
      );
    };

    // Notifications
    const NotificationsPage = ({data,setData}) => {
      const clear=()=>{const nd={...data,notifications:[]};setData(nd);saveData(nd);};
      return (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
            <h2 style={{margin:0,fontSize:22,color:COLORS.text}}>Notifications</h2>
            {data.notifications.length>0&&<Btn onClick={clear} variant="ghost">Clear All</Btn>}
          </div>
          {data.notifications.length===0?<EmptyState icon="bell" message="No notifications"/>:(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {data.notifications.map((n)=>(
                <Card key={n.id} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <div style={{background:n.type==="alert"?COLORS.warnDim:COLORS.accentDim,borderRadius:10,padding:10,flexShrink:0}}><Icon name={n.type==="alert"?"alert":"bell"} size={18} color={n.type==="alert"?COLORS.warn:COLORS.accent}/></div>
                  <div><div style={{fontSize:14,color:COLORS.text}}>{n.message}</div><div style={{fontSize:12,color:COLORS.textDim,marginTop:4}}>{fmtDate(n.date)}</div></div>
                </Card>
              ))}
            </div>
          )}
        </div>
      );
    };

    // Main App
    const NAV_ITEMS = [
      {id:"dashboard",label:"Dashboard",icon:"dashboard"},
      {id:"income",label:"Income",icon:"income"},
      {id:"expenses",label:"Expenses",icon:"expense"},
      {id:"budget",label:"Budget",icon:"budget"},
      {id:"savings",label:"Savings",icon:"savings"},
      {id:"investments",label:"Investments",icon:"invest"},
      {id:"reports",label:"Reports",icon:"reports"},
      {id:"notifications",label:"Alerts",icon:"bell"},
      {id:"profile",label:"Profile",icon:"profile"},
    ];

    function App() {
      const [data,setData]=useState(defaultData());
      const [loggedIn,setLoggedIn]=useState(false);
      const [page,setPage]=useState("dashboard");
      const [loading,setLoading]=useState(true);
      const [sidebarOpen,setSidebarOpen]=useState(false);
      const [isMobile,setIsMobile]=useState(window.innerWidth<=768);

      useEffect(()=>{
        const d=loadData();if(d) setData(d);setLoading(false);
        const handleResize=()=>setIsMobile(window.innerWidth<=768);
        window.addEventListener("resize",handleResize);return ()=>window.removeEventListener("resize",handleResize);
      },[]);

      if(loading) return (<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:COLORS.bg,color:COLORS.accent,fontFamily:"'Space Mono',monospace",fontSize:18}}>Loading...</div>);

      if(!loggedIn) return <AuthPage data={data} setData={setData} onDone={()=>setLoggedIn(true)}/>;

      const renderPage=()=>{
        switch(page){
          case "dashboard": return <DashboardPage data={data}/>;
          case "income": return <IncomePage data={data} setData={setData}/>;
          case "expenses": return <ExpensePage data={data} setData={setData}/>;
          case "budget": return <BudgetPage data={data} setData={setData}/>;
          case "savings": return <SavingsPage data={data} setData={setData}/>;
          case "investments": return <InvestmentPage data={data} setData={setData}/>;
          case "reports": return <ReportsPage data={data}/>;
          case "notifications": return <NotificationsPage data={data} setData={setData}/>;
          case "profile": return <ProfilePage data={data} setData={setData} onLogout={()=>setLoggedIn(false)}/>;
          default: return <DashboardPage data={data}/>;
        }
      };

      const unreadNotifs=data.notifications.length;

      return (
        <div style={{fontFamily:"'DM Sans',sans-serif",minHeight:"100vh",background:COLORS.bg,color:COLORS.text,display:"flex"}}>
          {sidebarOpen&&<div onClick={()=>setSidebarOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:99}}/>}
          <aside style={{width:220,background:COLORS.surface,borderRight:"1px solid "+COLORS.border,padding:"20px 12px",display:"flex",flexDirection:"column",flexShrink:0,height:"100vh",zIndex:100,transition:"left 0.3s ease",...(isMobile?{position:"fixed",top:0,left:sidebarOpen?0:-240}:{position:"sticky",top:0,left:0})}}>
            <div style={{fontSize:22,fontWeight:800,color:COLORS.accent,fontFamily:"'Space Mono',monospace",letterSpacing:-1,padding:"4px 10px 20px"}}>Fedha</div>
            <nav style={{flex:1,display:"flex",flexDirection:"column",gap:2,overflowY:"auto"}}>
              {NAV_ITEMS.map((item)=>(
                <button key={item.id} onClick={()=>{setPage(item.id);setSidebarOpen(false);}} style={{...btnBase,display:"flex",alignItems:"center",gap:10,padding:"10px 12px",width:"100%",textAlign:"left",fontSize:14,background:page===item.id?COLORS.accentDim:"transparent",color:page===item.id?COLORS.accent:COLORS.textMuted,borderRadius:10,position:"relative"}}>
                  <Icon name={item.icon} size={18} color={page===item.id?COLORS.accent:COLORS.textMuted}/>
                  {item.label}
                  {item.id==="notifications"&&unreadNotifs>0&&(<span style={{position:"absolute",right:10,background:COLORS.warn,color:"#fff",fontSize:10,fontWeight:700,borderRadius:10,padding:"1px 6px",minWidth:18,textAlign:"center"}}>{unreadNotifs}</span>)}
                </button>
              ))}
            </nav>
            <div style={{padding:"12px 10px",borderTop:"1px solid "+COLORS.border,fontSize:12,color:COLORS.textDim}}>{data.user.name}</div>
          </aside>
          <main style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",padding:"14px 20px",borderBottom:"1px solid "+COLORS.border,background:COLORS.surface}}>
              {isMobile&&<button onClick={()=>setSidebarOpen(true)} style={{background:"none",border:"none",cursor:"pointer",marginRight:12,padding:4}}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={COLORS.textMuted} strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
              </button>}
              <div style={{fontSize:16,fontWeight:600,color:COLORS.text}}>{NAV_ITEMS.find((n)=>n.id===page)?.label}</div>
            </div>
            <div style={{padding:"24px 20px",maxWidth:1100,margin:"0 auto"}}>{renderPage()}</div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
