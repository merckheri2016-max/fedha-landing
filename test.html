<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fedha Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0B0E11; color: #E8ECF4; font-family: sans-serif; padding: 40px; }
    #log { white-space: pre-wrap; font-size: 14px; line-height: 2; }
    .ok { color: #00D4AA; }
    .err { color: #FF6B6B; }
  </style>
</head>
<body>
  <h2>Fedha Connection Test</h2>
  <div id="log">Testing...</div>
  <script>
    const log = document.getElementById('log');
    function msg(text, ok) {
      log.innerHTML += '<div class="' + (ok ? 'ok' : 'err') + '">' + (ok ? '✓ ' : '✗ ') + text + '</div>';
    }

    async function test() {
      log.innerHTML = '';
      
      // Test 1: Supabase library loaded?
      try {
        if (window.supabase) {
          msg('Supabase library loaded', true);
        } else {
          msg('Supabase library NOT loaded', false);
          return;
        }
      } catch(e) { msg('Supabase library error: ' + e.message, false); return; }

      // Test 2: Create client
      let client;
      try {
        client = window.supabase.createClient(
          'https://evupiavcmdkaegcttsmy.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2dXBpYXZjbWRrYWVnY3R0c215Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzcwMzQsImV4cCI6MjA5MDc1MzAzNH0.Z6gL5c5vtOWy4zs3HwznaC5kOOrG83T_F6FC1XAMi98'
        );
        msg('Supabase client created', true);
      } catch(e) { msg('Client creation failed: ' + e.message, false); return; }

      // Test 3: Check auth
      try {
        const { data, error } = await client.auth.getSession();
        if (error) {
          msg('Auth check error: ' + error.message, false);
        } else {
          msg('Auth works - session: ' + (data.session ? 'logged in' : 'not logged in'), true);
        }
      } catch(e) { msg('Auth error: ' + e.message, false); }

      // Test 4: Check database
      try {
        const { data, error } = await client.from('profiles').select('count').limit(1);
        if (error) {
          msg('Database error: ' + error.message, false);
        } else {
          msg('Database connection works', true);
        }
      } catch(e) { msg('Database error: ' + e.message, false); }

      msg('', true);
      msg('Tests complete. If all green, your connection is fine.', true);
    }

    test();
  </script>
</body>
</html>
